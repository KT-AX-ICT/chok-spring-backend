services:
  mysql:
    image: mysql:8.4
    container_name: chok-mysql
    environment:
      MYSQL_DATABASE: chok
      MYSQL_USER: chok-spring
      MYSQL_PASSWORD: chok-spring
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3307:3306"   # 호스트 3306은 로컬 MySQL이 점유 → 3307로 매핑(컨테이너 내부는 3306)
    volumes:
      - chok-mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chok-mysql-data:
