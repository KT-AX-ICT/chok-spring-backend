spring:
  application:
    name: chok
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

python:
  base-url: ${PYTHON_BASE_URL:http://localhost:8000}
  # read(응답) 타임아웃(초). FastAPI 배치 캡(300s)보다 살짝 길게 — 워치독 역할.
  response-timeout-seconds: ${PYTHON_RESPONSE_TIMEOUT_SECONDS:310}

# 분석 잡(미분석 FATAL → FastAPI 분석 → 저장). 트리거는 코드에서 @Profile(local/prod)에서만 동작한다.
analysis:
  scheduler:
    enabled: ${ANALYSIS_SCHEDULER_ENABLED:true}                     # 5분 주기 자동 분석(기본 ON). false로 끔
    fixed-rate-ms: ${ANALYSIS_SCHEDULER_FIXED_RATE_MS:300000}        # 주기(5분)
    initial-delay-ms: ${ANALYSIS_SCHEDULER_INITIAL_DELAY_MS:15000}   # 첫 실행 지연(seed 적재 경합 회피)
  run-on-startup: ${ANALYSIS_RUN_ON_STARTUP:true}                    # 시작 시 1회 자동 분석(기본 ON). false로 끔
  chunk-size: ${ANALYSIS_CHUNK_SIZE:20}                              # FastAPI batch 묶음 크기
  default-limit: ${ANALYSIS_DEFAULT_LIMIT:200}                       # 스케줄러 1주기 처리 상한
  startup-limit: ${ANALYSIS_STARTUP_LIMIT:300}                       # 시작 1회 처리 상한

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:chok;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/chok?serverTimezone=Asia/Seoul
    username: chok-spring
    password: ${MYSQL_PASSWORD:chok-spring}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:file:./data/chok;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console
