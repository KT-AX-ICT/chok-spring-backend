spring:
  application:
    name: chok
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

python:
  base-url: ${PYTHON_BASE_URL:http://localhost:8000}
  # read(응답) 타임아웃(초). FastAPI 배치 캡(300s)보다 살짝 길게 — 워치독 역할.
  response-timeout-seconds: ${PYTHON_RESPONSE_TIMEOUT_SECONDS:310}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:chok;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://localhost:3306/chok?serverTimezone=Asia/Seoul
    username: chok-spring
    password: ${MYSQL_PASSWORD:chok-spring}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: "jdbc:mysql://localhost:3307/chok?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true&useSSL=false"
    username: chok-spring
    password: ${MYSQL_PASSWORD:chok-spring}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
